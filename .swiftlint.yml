# Included paths
included:
  - Stingray
# Excluded paths
excluded:
  - Carthage


# Opt-in rules
opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - array_init
  - closure_end_indentation
  - closure_spacing
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - collection_alignment
  - discouraged_none_name
  - empty_count
  - expiring_todo
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - for_where
  - force_unwrapping
  - identical_operands
  - implicitly_unwrapped_optional
  - last_where
  - line_length
  - local_doc_comment
  - missing_docs
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - nimble_operator
  - operator_usage_whitespace
  - optional_enum_case_matching
  - orphaned_doc_comment
  - sorted_imports
  - static_operator
  - toggle_bool
  - inclusive_language
  - explicit_acl

# Rules
line_length:
  warning: 140
  error: 240

trailing_semicolon: error

force_cast: warning

missing_docs:
  warning: [open, public, fileprivate, internal, private]
  excludes_extensions: false

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - statement_position
  - todo
  - colon
  - private_over_fileprivate
  - function_parameter_count
  - identifier_name
  - function_body_length
  - nesting
  - file_length
  - redundant_string_enum_value
  - type_body_length
  - cyclomatic_complexity

# Custom Rules:
custom_rules:
  only_log:
    name: "Only Log"
    message: "Use Log.[debug|info|warning|error|critical](_:) over print(_:)."
    severity: warning # Warning so we can use print for debugging
    regex: '\bprint\s*\(\s*' # Matches `print(`
    match_kinds: # Help against comments and such
      - identifier
  theme_class_naming:
    name: "Theme Class Naming"
    regex: 'class\s+(?!Theme)\w+\s*:\s*[^{]*\bThemeProtocol\b'
    message: "Themes must be prefixed with 'Theme'."
    severity: error
  no_internal_acl:
    name: "No Internal ACL"
    regex: "\\binternal\\b"
    message: "Use of 'internal' is not allowed, and should likely be marked as public."
    severity: error
    match_kinds:
      - keyword
      - identifier
      - typeidentifier
      - attribute.builtin
